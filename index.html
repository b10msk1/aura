<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Engine V4.3.1 - Neural Scout</title>
    <!-- Bibliotek -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; color: white; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        .glass-dark { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        input:focus { outline: none; }
        .glow-red { text-shadow: 0 0 25px rgba(225, 29, 72, 0.6); }
        .hud-scanline { position: fixed; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(255, 255, 255, 0.01) 50%); background-size: 100% 4px; pointer-events: none; z-index: 60; }
        .aura-media-layer { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; will-change: transform, filter, opacity; }
        .video-fixed { object-fit: contain; background: black; }
        .calibration-bg { position: fixed; inset: 0; background: url('https://i.imgur.com/dsdSSgr.jpeg') center/cover no-repeat; opacity: 0.7; z-index: -1; }
        .reticle-spin { animation: spin 20s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .custom-scrollbar::-webkit-scrollbar { width: 2px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence, useSpring, useTransform } = Motion;

        const VIDEO_LINKS = {
            INTRO: "https://i.imgur.com/PPjDdX9.mp4",
            TRANS_1: "https://i.imgur.com/Chxka6U.mp4", 
            TRANS_2: "https://i.imgur.com/PXYERwx.mp4", 
            TRANS_3: "https://i.imgur.com/KkEzCrW.mp4", 
            TRANS_4: "https://i.imgur.com/aiZYzCk.mp4"  
        };

        const STAGES = {
            1: { name: 'INITIAL KONTAKT', color: '#4f46e5', images: Array.from({length: 10}, (_, i) => `assets/steg1/bild${i+1}.jpeg`), video: VIDEO_LINKS.TRANS_1, videoDuration: 14000, voiceStyle: "Tala formellt och stadigt." },
            2: { name: 'FÖRTROENDE', color: '#fbbf24', images: Array.from({length: 10}, (_, i) => `assets/steg2/bild${i+1}.jpeg`), videoDuration: 8000, nextVideo: VIDEO_LINKS.TRANS_3, voiceStyle: "Tala varmt och välkomnande." },
            3: { name: 'INTIMITET', color: '#e11d48', images: Array.from({length: 10}, (_, i) => `assets/steg3/bild${i+1}.jpeg`), videoDuration: 8000, nextVideo: VIDEO_LINKS.TRANS_4, voiceStyle: "Tala djupt personligt." },
            4: { name: 'FULLSTÄNDIG SYNK', color: '#ffffff', images: Array.from({length: 12}, (_, i) => `assets/steg4/bild${i+1}.jpeg`), videoDuration: 8000, voiceStyle: "Viska extremt mjukt och nära." }
        };

        // Blom: Här är din uppdaterade nyckel
        const apiKey = "AIzaSyCu1GxY3R9TqyP5yXAfhgtWpTVGpcFIgwI"; 

        const VoiceAuraVFX = ({ stage, isSpeaking }) => {
            const mountRef = useRef(null);
            const pointsRef = useRef();
            useEffect(() => {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 5;
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                if(mountRef.current) mountRef.current.appendChild(renderer.domElement);
                const positions = new Float32Array(2000 * 3);
                for (let i = 0; i < 2000 * 3; i++) positions[i] = (Math.random() - 0.5) * 15;
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const material = new THREE.PointsMaterial({ size: 0.02, color: new THREE.Color(STAGES[stage].color), transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending });
                const points = new THREE.Points(geometry, material);
                pointsRef.current = points;
                scene.add(points);
                const animate = () => { points.rotation.y += 0.0008; renderer.render(scene, camera); requestAnimationFrame(animate); };
                animate();
                return () => renderer.dispose();
            }, []);
            useEffect(() => { if(pointsRef.current) pointsRef.current.material.color.set(STAGES[stage].color); }, [stage]);
            return <div ref={mountRef} className="fixed inset-0 z-20 pointer-events-none opacity-40" />;
        };

        function App() {
            const [appState, setAppState] = useState('greeting'); 
            const [userName, setUserName] = useState('');
            const [syncDifficulty, setSyncDifficulty] = useState(0.045); 
            const [intimacy, setIntimacy] = useState(0.05);
            const [currentStage, setCurrentStage] = useState(1);
            const [imageIndex, setImageIndex] = useState(0);
            const [isTransitioning, setIsTransitioning] = useState(false);
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [isThinking, setIsThinking] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [responseType, setResponseType] = useState('fast'); 
            const [showText, setShowText] = useState(false);
            
            const [activeModel, setActiveModel] = useState('gemini-1.5-flash');

            const audioRef = useRef(new Audio());
            const gyroX = useSpring(0, { stiffness: 40, damping: 25 });
            const gyroY = useSpring(0, { stiffness: 40, damping: 25 });
            const parallaxX = useTransform(gyroX, [-30, 30], ["-2%", "2%"]);
            const parallaxY = useTransform(gyroY, [-30, 30], ["-2%", "2%"]);

            useEffect(() => {
                const interval = setInterval(() => {
                    if (!isTransitioning && appState === 'main') {
                        const count = STAGES[currentStage].images.length;
                        setImageIndex(prev => (prev + 1) % count);
                    }
                }, 30000); // 30 sekunder per bild
                return () => clearInterval(interval);
            }, [currentStage, isTransitioning, appState]);

            const speak = async (text, stage) => {
                if(!apiKey) return;
                setIsSpeaking(true);
                const voicePrompt = `${STAGES[stage].voiceStyle} Säg: ${text}`;
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: voicePrompt }] }], generationConfig: { responseModalities: ["AUDIO"] } })
                    });
                    const data = await res.json();
                    const base64 = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                    if(base64) {
                        audioRef.current.src = `data:audio/wav;base64,${base64}`;
                        audioRef.current.play();
                        audioRef.current.onended = () => setIsSpeaking(false);
                    } else { setIsSpeaking(false); }
                } catch(e) { setIsSpeaking(false); }
            };

            const handleSend = async (e) => {
                if(e) e.preventDefault();
                if (!inputText.trim() || isThinking) return;
                const text = inputText;
                setInputText('');
                setMessages(prev => [...prev, { id: `u-${Date.now()}`, text, sender: 'user' }]);
                setIsThinking(true);
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${activeModel}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [...messages.slice(-6).map(m => ({ role: m.sender === 'user' ? 'user' : 'model', parts: [{ text: m.text }] })), { role: 'user', parts: [{ text }] }],
                            systemInstruction: { parts: [{ text: `Du är Aura, 28 år, på dejt med ${userName}. Svara ${responseType === 'fast' ? 'kort' : 'djupt'} på svenska. Inga upprepningar.` }] }
                        })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error?.message || "Länkfel");
                    const aiText = data.candidates[0].content.parts[0].text;
                    setIsThinking(false);
                    setMessages(prev => [...prev, { id: `a-${Date.now()}`, text: aiText, sender: 'ai' }]);
                    setIntimacy(prev => Math.min(1, prev + syncDifficulty));
                    speak(aiText, currentStage);
                } catch (e) { 
                    setIsThinking(false);
                    setMessages(prev => [...prev, { id: `err-${Date.now()}`, text: `Neural avvikelse: ${e.message}`, sender: 'ai', isError: true }]);
                }
            };

            useEffect(() => {
                const nextStage = intimacy >= 0.8 ? 4 : intimacy >= 0.5 ? 3 : intimacy >= 0.25 ? 2 : 1;
                if (nextStage > currentStage) {
                    setIsTransitioning(true);
                    setTimeout(() => { setCurrentStage(nextStage); setImageIndex(0); setIsTransitioning(false); }, 8000);
                }
            }, [intimacy]);

            return (
                <div className="fixed inset-0 bg-black flex flex-col items-center justify-center font-sans overflow-hidden">
                    <div className="hud-scanline"></div>
                    <AnimatePresence mode="wait">
                        {appState === 'greeting' && (
                            <motion.div key="greeting" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="absolute inset-0 z-[300] bg-black">
                                <video src={VIDEO_LINKS.INTRO} autoPlay muted playsInline className="fixed inset-0 w-full h-full object-contain" onEnded={() => setAppState('instructions')} />
                                <div className="absolute inset-x-0 bottom-12 flex justify-center z-[310]"><button onClick={() => setAppState('instructions')} className="bg-white/10 backdrop-blur-xl border border-white/20 text-white px-10 py-5 rounded-2xl text-[10px] font-black uppercase tracking-[0.3em]">Starta</button></div>
                            </motion.div>
                        )}
                        {appState === 'instructions' && (
                            <motion.div key="instructions" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="absolute inset-0 z-[200] flex flex-col items-center justify-center p-8 text-center glass-dark">
                                <div className="calibration-bg"></div>
                                <h1 className="text-3xl font-light tracking-[0.4em] uppercase mb-10 glow-red text-white">Neural Scout</h1>
                                <div className="w-full max-w-sm space-y-6 text-white mb-10">
                                    <input type="text" value={userName} onChange={(e) => setUserName(e.target.value)} placeholder="Namn..." className="w-full glass-dark py-5 px-6 rounded-2xl text-center font-bold border-white/10" />
                                    <div className="space-y-2">
                                        <p className="text-[9px] font-black opacity-40 uppercase">Aktiv Kärna</p>
                                        <div className="flex gap-2">
                                            {['gemini-1.5-flash', 'gemini-1.5-pro'].map(m => (
                                                <button key={m} onClick={() => setActiveModel(m)} className={`flex-1 py-3 rounded-xl text-[7px] font-black border transition-all ${activeModel === m ? 'bg-indigo-500 text-white border-indigo-400' : 'glass-dark opacity-40'}`}>{m.includes('flash') ? 'FLASH' : 'PRO'}</button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => setAppState('main')} disabled={!userName.trim()} className="bg-white text-black px-12 py-6 rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] w-full max-w-xs shadow-2xl">Initiera Länk</button>
                                <p className="text-[9px] opacity-30 uppercase italic mt-10">Ta hand om varandra / B10M</p>
                            </motion.div>
                        )}
                        {appState === 'main' && (
                            <motion.div key="main" initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="absolute inset-0 flex flex-col justify-end p-6">
                                {isTransitioning ? (
                                    <motion.video key={`vid-${currentStage}`} src={messages.length <= 1 ? STAGES[1].video : STAGES[currentStage].nextVideo} autoPlay muted playsInline preload="auto" className="aura-media-layer video-layer video-fixed" />
                                ) : (
                                    <motion.img key={`img-${currentStage}-${imageIndex}`} src={STAGES[currentStage].images[imageIndex]} initial={{ opacity: 0 }} animate={{ opacity: 1, filter: isSpeaking ? "brightness(1.4)" : "brightness(1)", x: parallaxX, y: parallaxY }} transition={{ duration: 2.5 }} className="aura-media-layer" />
                                )}
                                <div className="fixed top-0 inset-x-0 p-8 flex justify-between items-start z-[100] text-white">
                                    <div className="flex flex-col gap-1"><span className="text-[9px] font-black opacity-30 uppercase">Neural Scout V4.3.1</span><span className="text-xs font-bold uppercase" style={{ color: STAGES[currentStage].color }}>{STAGES[currentStage].name}</span></div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setAppState('instructions')} className="p-4 rounded-2xl glass-dark opacity-40"><i data-lucide="settings-2" className="w-5 h-5 text-white"></i></button>
                                        <button onClick={() => setResponseType(responseType === 'fast' ? 'deep' : 'fast')} className="p-4 rounded-2xl glass-dark text-[9px] font-black uppercase text-white">{responseType === 'fast' ? 'Fast' : 'Deep'}</button>
                                    </div>
                                </div>
                                <VoiceAuraVFX stage={currentStage} isSpeaking={isSpeaking} />
                                <AnimatePresence>{showText && (
                                    <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: 20 }} className="fixed bottom-36 inset-x-6 max-h-[40vh] overflow-y-auto glass-dark rounded-[2.5rem] p-8 hide-scrollbar z-50 text-white text-sm italic opacity-90">
                                        {messages.map((m, i) => (<div key={i} className={`mb-4 ${m.sender === 'user' ? 'text-right opacity-40' : (m.isError ? 'text-red-400 font-bold text-[10px]' : 'text-left font-medium')}`}>{m.text}</div>))}
                                    </motion.div>
                                )}</AnimatePresence>
                                <div className="flex w-full max-w-lg mx-auto z-[100] gap-4 mb-8">
                                    <button onClick={() => setShowText(!showText)} className={`p-7 glass-dark rounded-full ${showText ? 'text-white' : 'text-white/40'}`}><i data-lucide="message-square" className="w-5 h-5"></i></button>
                                    <form onSubmit={handleSend} className="flex-1"><input type="text" value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder={isThinking ? "Aura bearbetar..." : "Dela din frekvens..."} disabled={isThinking} className="w-full glass-dark py-7 px-10 rounded-full text-center text-sm text-white shadow-2xl" autoComplete="off" /></form>
                                </div>
                                <div className="text-center text-[9px] opacity-10 uppercase tracking-[0.5em] mb-4 font-black italic text-white uppercase tracking-widest uppercase">Engine V4.3.1 // Architect: B10M</div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setInterval(() => { if(window.lucide) window.lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
