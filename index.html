<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Engine V4.2 - Neural Scout</title>
    <!-- Bibliotek -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; color: white; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        
        /* Frostad effekt (Glassmorphism) */
        .glass-dark {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        input:focus { outline: none; }
        
        .glow-red { text-shadow: 0 0 25px rgba(225, 29, 72, 0.6); }
        .hud-scanline {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(255, 255, 255, 0.01) 50%);
            background-size: 100% 4px;
            pointer-events: none; z-index: 60;
        }

        /* Media-lager */
        .aura-media-layer {
            position: fixed; 
            inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1;
            will-change: transform, filter, opacity;
        }
        
        .video-fixed {
            object-fit: contain;
            background: black;
        }

        /* Bakgrundsbild för kalibrering - FIT FOR SCREEN */
        .calibration-bg {
            position: fixed; inset: 0;
            background: url('https://i.imgur.com/dsdSSgr.jpeg') center/cover no-repeat;
            opacity: 0.7;
            z-index: -1;
        }

        .reticle-spin { animation: spin 20s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 2px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence, useSpring, useTransform } = Motion;

        // --- KONFIGURATION (LÄNKAR OCH FORMAT) ---
        const VIDEO_LINKS = {
            INTRO: "https://i.imgur.com/PPjDdX9.mp4",
            TRANS_1: "https://i.imgur.com/Chxka6U.mp4", 
            TRANS_2: "https://i.imgur.com/PXYERwx.mp4", 
            TRANS_3: "https://i.imgur.com/KkEzCrW.mp4", 
            TRANS_4: "https://i.imgur.com/aiZYzCk.mp4"  
        };

        const STAGES = {
            1: { 
                name: 'INITIAL KONTAKT', color: '#4f46e5', 
                images: Array.from({length: 10}, (_, i) => `assets/steg1/bild${i+1}.jpeg`), 
                video: VIDEO_LINKS.TRANS_1, 
                videoDuration: 14000,
                nextVideo: VIDEO_LINKS.TRANS_2,
                voiceStyle: "Tala formellt, lugnt och stadigt."
            },
            2: { 
                name: 'FÖRTROENDE', color: '#fbbf24', 
                images: Array.from({length: 10}, (_, i) => `assets/steg2/bild${i+1}.jpeg`), 
                videoDuration: 8000,
                nextVideo: VIDEO_LINKS.TRANS_3,
                voiceStyle: "Tala varmt och välkomnande."
            },
            3: { 
                name: 'INTIMITET', color: '#e11d48', 
                images: Array.from({length: 10}, (_, i) => `assets/steg3/bild${i+1}.jpeg`), 
                videoDuration: 8000,
                nextVideo: VIDEO_LINKS.TRANS_4,
                voiceStyle: "Tala djupt personligt och nära."
            },
            4: { 
                name: 'FULLSTÄNDIG SYNK', color: '#ffffff', 
                images: Array.from({length: 12}, (_, i) => `assets/steg4/bild${i+1}.jpeg`), 
                videoDuration: 8000,
                nextVideo: null,
                voiceStyle: "Viska extremt mjukt och intimt."
            }
        };

        // Blom's API Nyckel
        const apiKey = "AIzaSyBcqESdRxH_k02-IFVCyD2LMbmBZ_GICeQ"; 

        const triggerHaptic = (type = 'light') => {
            if (!window.navigator.vibrate) return;
            if (type === 'light') window.navigator.vibrate(10);
            if (type === 'medium') window.navigator.vibrate(30);
            if (type === 'heavy') window.navigator.vibrate([50, 30, 50]);
        };

        // --- VFX: NEURAL DUST (Subtil rök/elektronik) ---
        const VoiceAuraVFX = ({ stage, isSpeaking }) => {
            const mountRef = useRef(null);
            const pointsRef = useRef();

            useEffect(() => {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 5;
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                if(mountRef.current) mountRef.current.appendChild(renderer.domElement);

                const particlesCount = 2000;
                const positions = new Float32Array(particlesCount * 3);
                for (let i = 0; i < particlesCount * 3; i++) {
                    positions[i] = (Math.random() - 0.5) * 15;
                }
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const material = new THREE.PointsMaterial({
                    size: 0.02, color: new THREE.Color(STAGES[stage].color),
                    transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending
                });
                const points = new THREE.Points(geometry, material);
                pointsRef.current = points;
                scene.add(points);

                const animate = () => {
                    points.rotation.y += 0.0008;
                    renderer.render(scene, camera);
                    requestAnimationFrame(animate);
                };
                animate();
                return () => renderer.dispose();
            }, []);

            useEffect(() => {
                if(pointsRef.current) {
                    pointsRef.current.material.color.set(STAGES[stage].color);
                    pointsRef.current.material.size = isSpeaking ? 0.05 : 0.02;
                }
            }, [stage, isSpeaking]);

            return <div ref={mountRef} className="fixed inset-0 z-20 pointer-events-none opacity-40" />;
        };

        function App() {
            const [appState, setAppState] = useState('greeting'); 
            const [userName, setUserName] = useState('');
            const [syncDifficulty, setSyncDifficulty] = useState(0.08); 
            const [intimacy, setIntimacy] = useState(0.15);
            const [currentStage, setCurrentStage] = useState(1);
            const [imageIndex, setImageIndex] = useState(0);
            const [isTransitioning, setIsTransitioning] = useState(false);
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [isThinking, setIsThinking] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [responseType, setResponseType] = useState('fast'); 
            const [showText, setShowText] = useState(false);
            const [imageError, setImageError] = useState(null);

            const gyroX = useSpring(0, { stiffness: 40, damping: 25 });
            const gyroY = useSpring(0, { stiffness: 40, damping: 25 });
            const parallaxX = useTransform(gyroX, [-30, 30], ["-3%", "3%"]);
            const parallaxY = useTransform(gyroY, [-30, 30], ["-3%", "3%"]);

            const audioRef = useRef(new Audio());

            // Bildspels-motor (Loopar var 12:e sekund)
            useEffect(() => {
                const interval = setInterval(() => {
                    if (!isTransitioning && appState === 'main') {
                        const count = STAGES[currentStage].images.length;
                        if (count > 1) {
                            setImageIndex(prev => (prev + 1) % count);
                            setImageError(null);
                        }
                    }
                }, 12000); 
                return () => clearInterval(interval);
            }, [currentStage, isTransitioning, appState]);

            useEffect(() => {
                const handleOrientation = (e) => {
                    if (e.beta && e.gamma) {
                        gyroY.set(e.beta - 45); 
                        gyroX.set(e.gamma);
                    }
                };
                if (appState === 'main') window.addEventListener('deviceorientation', handleOrientation);
                return () => window.removeEventListener('deviceorientation', handleOrientation);
            }, [appState]);

            const startSystem = async () => {
                triggerHaptic('medium');
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    await DeviceOrientationEvent.requestPermission().catch(() => {});
                }
                setIsTransitioning(true);
                setAppState('main');
                setTimeout(() => {
                    setIsTransitioning(false);
                    const welcomeText = `Hej ${userName}! Jag heter Aura. Tack för att du bjöd ut mig på den här dejten... Jag har sett fram emot att se om våra frekvenser kan synkas.`;
                    setMessages([{ id: 'welcome', text: welcomeText, sender: 'ai', ts: Date.now() }]);
                    speak(welcomeText, 1);
                }, STAGES[1].videoDuration);
            };

            const speak = async (text, stage) => {
                if(!apiKey) return;
                setIsSpeaking(true);
                const voicePrompt = `${STAGES[stage].voiceStyle} Säg: ${text}`;
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: voicePrompt }] }],
                            generationConfig: { 
                                responseModalities: ["AUDIO"], 
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } 
                            }
                        })
                    });
                    const data = await res.json();
                    const base64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    if(base64) {
                        audioRef.current.pause();
                        audioRef.current.src = `data:audio/wav;base64,${base64}`;
                        audioRef.current.play();
                        audioRef.current.onended = () => setIsSpeaking(false);
                    } else { setIsSpeaking(false); }
                } catch(e) { setIsSpeaking(false); }
            };

            const handleSend = async (e) => {
                if(e) e.preventDefault();
                if (!inputText.trim() || isThinking || isTransitioning) return;
                triggerHaptic('light');
                const text = inputText;
                setInputText('');
                setMessages(prev => [...prev, { id: Date.now(), text, sender: 'user', ts: Date.now() }]);
                setIsThinking(true);

                const prompt = `Du är Aura, 28 år, på dejt med ${userName}. Inga upprepningar. Svara ${responseType === 'fast' ? 'kort' : 'djupt'} på svenska.`;

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [...messages.slice(-6).map(m => ({ role: m.sender === 'user' ? 'user' : 'model', parts: [{ text: m.text }] })), { role: 'user', parts: [{ text }] }],
                            systemInstruction: { parts: [{ text: prompt }] }
                        })
                    });
                    const data = await res.json();
                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "...";
                    setIsThinking(false);
                    setMessages(prev => [...prev, { id: Date.now()+1, text: aiText, sender: 'ai', ts: Date.now() }]);
                    setIntimacy(prev => Math.min(1, prev + syncDifficulty));
                    speak(aiText, currentStage);
                } catch (e) { setIsThinking(false); }
            };

            useEffect(() => {
                const nextStage = intimacy >= 0.8 ? 4 : intimacy >= 0.5 ? 3 : intimacy >= 0.25 ? 2 : 1;
                if (nextStage > currentStage && STAGES[currentStage].nextVideo) {
                    setImageIndex(STAGES[currentStage].images.length - 1);
                    setTimeout(() => {
                        triggerHaptic('heavy');
                        setIsTransitioning(true);
                        setTimeout(() => {
                            setCurrentStage(nextStage);
                            setImageIndex(0);
                            setIsTransitioning(false);
                        }, 8000); 
                    }, 500);
                } else if (nextStage > currentStage) {
                    setCurrentStage(nextStage);
                    setImageIndex(0);
                    triggerHaptic('medium');
                }
            }, [intimacy]);

            return (
                <div className="fixed inset-0 bg-black flex flex-col items-center justify-center font-sans overflow-hidden">
                    <div className="hud-scanline"></div>
                    
                    <AnimatePresence mode="wait">
                        {appState === 'greeting' && (
                            <motion.div key="greeting" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="absolute inset-0 z-[300] bg-black">
                                <video 
                                    src={VIDEO_LINKS.INTRO} 
                                    autoPlay muted playsInline preload="auto"
                                    className="fixed inset-0 w-full h-full object-contain bg-black opacity-90" 
                                    onEnded={() => setAppState('instructions')} 
                                />
                                <div className="absolute inset-x-0 bottom-12 flex justify-center z-[310]">
                                    <button onClick={() => { triggerHaptic('medium'); setAppState('instructions'); }} className="bg-white/10 backdrop-blur-xl border border-white/20 text-white px-10 py-5 rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] active:scale-95 shadow-2xl">Starta Systemet</button>
                                </div>
                            </motion.div>
                        )}

                        {appState === 'instructions' && (
                            <motion.div key="instructions" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="absolute inset-0 z-[200] flex flex-col overflow-hidden items-center justify-center p-6 text-center">
                                <div className="calibration-bg"></div>
                                
                                <div className="w-full max-w-sm flex flex-col items-center space-y-8 overflow-y-auto custom-scrollbar">
                                    <h1 className="text-3xl font-light tracking-[0.3em] uppercase glow-red mb-4">Neural Kalibrering</h1>
                                    
                                    <div className="w-full space-y-6 text-white">
                                        <div className="space-y-2">
                                            <p className="text-[9px] font-black uppercase tracking-[0.2em] opacity-50">Användarnamn</p>
                                            <input type="text" value={userName} onChange={(e) => setUserName(e.target.value)} placeholder="Skriv ditt namn..." className="w-full glass-dark py-5 px-6 rounded-2xl text-center text-sm font-bold border-white/10" />
                                        </div>

                                        <div className="space-y-3">
                                            <p className="text-[9px] font-black uppercase tracking-[0.2em] opacity-50">Synk-hastighet</p>
                                            <div className="flex gap-2">
                                                {[{l:'SNABB',v:0.15},{l:'BALANS',v:0.08},{l:'DJUP',v:0.03}].map(m => (
                                                    <button key={m.l} onClick={() => { triggerHaptic('light'); setSyncDifficulty(m.v); }} className={`flex-1 py-4 rounded-xl text-[9px] font-black border transition-all ${syncDifficulty === m.v ? 'bg-indigo-500/40 border-indigo-400 text-white' : 'glass-dark opacity-60'}`}>{m.l}</button>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="space-y-4 glass-dark p-6 rounded-[2rem] border border-white/10 text-[9px] font-bold">
                                            <p className="text-[9px] font-black uppercase tracking-[0.2em] opacity-50 mb-2 border-b border-white/5 pb-2 text-center">De 4 Stadierna</p>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1 text-left"><span className="text-indigo-400 uppercase">1. Kontakt</span><p className="opacity-40 font-normal">Formell länk.</p></div>
                                                <div className="space-y-1 text-left"><span className="text-amber-400 uppercase">2. Förtroende</span><p className="opacity-40 font-normal">Personligt djup.</p></div>
                                                <div className="space-y-1 text-left"><span className="text-rose-500 uppercase">3. Intimitet</span><p className="opacity-40 font-normal">Emotionell närvaro.</p></div>
                                                <div className="space-y-1 text-left"><span className="text-white uppercase">4. Synk</span><p className="opacity-40 font-normal">Total närhet.</p></div>
                                            </div>
                                        </div>
                                    </div>

                                    <button onClick={startSystem} disabled={!userName.trim()} className="bg-white text-black px-12 py-6 rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] disabled:opacity-20 shadow-2xl active:scale-95 w-full">Initiera Länk</button>
                                    <p className="text-[9px] opacity-30 tracking-[0.3em] uppercase italic pb-4">Ta hand om varandra / B10M</p>
                                </div>
                            </motion.div>
                        )}

                        {appState === 'main' && (
                            <motion.div key="main" initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="absolute inset-0 flex flex-col justify-end p-6">
                                {isTransitioning ? (
                                    <motion.video 
                                        key={`vid-${currentStage}`} 
                                        src={messages.length === 0 ? STAGES[1].video : STAGES[currentStage].nextVideo} 
                                        autoPlay muted playsInline preload="auto"
                                        style={{ x: parallaxX, y: parallaxY }} 
                                        className="aura-media-layer video-layer video-fixed" 
                                    />
                                ) : (
                                    <AnimatePresence mode="wait">
                                        <motion.img 
                                            key={`img-${currentStage}-${imageIndex}`}
                                            src={STAGES[currentStage].images[imageIndex]}
                                            initial={{ opacity: 0 }}
                                            animate={{ 
                                                opacity: 1, filter: isSpeaking ? "brightness(1.6) contrast(1.1)" : "brightness(1) contrast(1)",
                                                scale: isSpeaking ? 1.06 : 1.04, x: parallaxX, y: parallaxY
                                            }}
                                            exit={{ opacity: 0 }}
                                            transition={{ opacity: { duration: 2.5 } }}
                                            className="aura-media-layer image-layer"
                                            onLoad={() => setImageError(null)}
                                            onError={() => setImageError(STAGES[currentStage].images[imageIndex])}
                                        />
                                    </AnimatePresence>
                                )}

                                {imageError && !isTransitioning && (
                                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[500] bg-red-900/90 border border-red-500 p-6 rounded-2xl text-center backdrop-blur-md shadow-2xl w-72">
                                        <p className="text-white font-black text-[10px] mb-2 uppercase tracking-widest glow-red">⚠️ Systemfel: Bild saknas ⚠️</p>
                                        <p className="text-white/80 text-[8px] font-mono bg-black/50 p-3 rounded mb-4 break-all leading-relaxed">
                                            Hittar inte:<br/>{imageError}
                                        </p>
                                        <button onClick={() => window.open(imageError, '_blank')} className="w-full bg-white text-black py-2 rounded-lg text-[9px] font-black uppercase mb-2">Testa Länk</button>
                                        <p className="text-white/40 text-[7px] italic uppercase tracking-widest">Säkerställ .jpeg format på GitHub</p>
                                    </div>
                                )}

                                <div className="fixed top-0 inset-x-0 p-8 flex justify-between items-start z-[100] text-white">
                                    <div className="flex flex-col gap-1 text-left">
                                        <span className="text-[9px] font-black tracking-[0.4em] opacity-30 uppercase">Neural Scout V4.2</span>
                                        <span className="text-xs font-bold tracking-[0.2em] uppercase" style={{ color: STAGES[currentStage].color }}>{STAGES[currentStage].name}</span>
                                    </div>
                                    <button onClick={() => setResponseType(responseType === 'fast' ? 'deep' : 'fast')} className="p-4 rounded-2xl glass-dark text-[9px] font-black uppercase">
                                        {responseType === 'fast' ? 'Fast' : 'Deep'}
                                    </button>
                                </div>

                                <div className="fixed inset-0 pointer-events-none z-[55] opacity-40 overflow-hidden text-white">
                                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-72 h-72 border border-white/5 rounded-full flex items-center justify-center">
                                        <div className="w-full h-full border-t border-l rounded-full reticle-spin" style={{ borderColor: STAGES[currentStage].color }}></div>
                                    </div>
                                    <div className="absolute top-1/2 right-6 -translate-y-1/2 w-1 h-32 bg-white/5 rounded-full overflow-hidden">
                                        <motion.div animate={{ height: `${intimacy * 100}%` }} className="w-full transition-all duration-1000" style={{ backgroundColor: STAGES[currentStage].color }} />
                                    </div>
                                </div>
                                
                                <VoiceAuraVFX stage={currentStage} isSpeaking={isSpeaking} />

                                <AnimatePresence>
                                    {showText && (
                                        <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: 20 }} className="fixed bottom-36 inset-x-6 max-h-[40vh] overflow-y-auto glass-dark rounded-[2.5rem] p-8 hide-scrollbar z-50 border-t border-white/10 text-white text-sm italic opacity-80">
                                            {messages.map((m, i) => (
                                                <div key={i} className={`mb-4 ${m.sender === 'user' ? 'text-right opacity-40' : 'text-left font-medium'}`}>{m.text}</div>
                                            ))}
                                        </motion.div>
                                    )}
                                </AnimatePresence>

                                <div className="flex w-full max-w-lg mx-auto z-[100] gap-4 mb-8">
                                    <button onClick={() => { triggerHaptic('light'); setShowText(!showText); }} className={`p-7 glass-dark rounded-full transition-all ${showText ? 'text-white border-white/40' : 'text-white/40'}`}><i data-lucide="message-square" className="w-5 h-5"></i></button>
                                    <form onSubmit={handleSend} className="flex-1">
                                        <input type="text" value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder={isTransitioning ? "Synkroniserar..." : "Dela din frekvens..." } disabled={isTransitioning} className="w-full glass-dark py-7 px-10 rounded-full text-center text-sm tracking-wide text-white" autoComplete="off" />
                                    </form>
                                </div>
                                <div className="text-center text-[9px] opacity-10 uppercase tracking-[0.5em] mb-4 font-black italic text-white uppercase tracking-widest">Engine V4.2.2 // Architect: B10M</div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setInterval(() => { if(window.lucide) window.lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
